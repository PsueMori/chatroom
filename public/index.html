<!DOCTYPE html>
<html>
<head>
  <title>Global Chatroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Decorative vines -->
<div class="vine left-vine"></div>
<div class="vine right-vine"></div>

<!-- Main chat layout -->
<div id="main">
  <div id="sidebar">
    <h3>Users</h3>
    <ul id="users"></ul>
  </div>

  <div id="chat">
    <label>Username:</label>
    <input id="username" placeholder="Enter username">

    <ul id="messages"></ul>

    <form id="form">
      <input id="input" autocomplete="off" placeholder="Message">
      <input type="file" id="fileInput">
      <button>Send</button>
    </form>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="client.js"></script>
</body>
</html>
